
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Task Nova Pro | Earn Rewards</title>
    
    <!-- PWA & Mobile Optimization -->
    <meta name="theme-color" content="#6366f1">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="manifest" href="manifest.json">
    
    <!-- Google IMA SDK for Web Ads (Standard for Browsers) -->
    <script type="text/javascript" src="https://imasdk.googleapis.com/js/sdkloader/ima3.js"></script>
    
    <!-- SEO & Metadata -->
    <meta name="description" content="Premium Earning Rewards App - Surveys, Games, and Daily Tasks">
    <meta property="og:title" content="Task Nova Pro">
    <meta property="og:description" content="Start earning coins today!">
    
    <!-- External Resources -->
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        /* Base Styling */
        body {
            background-color: #0f172a;
            color: #f8fafc;
            margin: 0;
            padding: 0;
            overflow-x: hidden;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            -webkit-tap-highlight-color: transparent;
            user-select: none;
        }

        /* Splash Screen Animation */
        #splash-screen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at center, #1e293b 0%, #0f172a 100%);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 9999;
            transition: opacity 0.5s ease-out, visibility 0.5s;
        }

        .logo-container {
            width: 120px;
            height: 120px;
            background: rgba(99, 102, 241, 0.1);
            border-radius: 40px;
            display: flex;
            align-items: center;
            justify-content: center;
            border: 1px solid rgba(99, 102, 241, 0.2);
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.3);
            margin-bottom: 24px;
            animation: pulse-border 2s infinite;
        }

        @keyframes pulse-border {
            0% { transform: scale(1); box-shadow: 0 0 0 0 rgba(99, 102, 241, 0.4); }
            70% { transform: scale(1.05); box-shadow: 0 0 0 20px rgba(99, 102, 241, 0); }
            100% { transform: scale(1); box-shadow: 0 0 0 0 rgba(99, 102, 241, 0); }
        }

        .loading-bar {
            width: 140px;
            height: 4px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 10px;
            overflow: hidden;
            position: relative;
        }

        .loading-bar::after {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, #6366f1, transparent);
            animation: loading 1.5s infinite;
        }

        @keyframes loading {
            0% { left: -100%; }
            100% { left: 100%; }
        }

        /* Glassmorphism Classes */
        .glass-card {
            background: rgba(30, 41, 59, 0.7);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        /* Custom Animations */
        .animate-fade-in { animation: fadeIn 0.4s ease-out forwards; }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        
        .ticker-scroll {
            display: flex;
            animation: ticker 30s linear infinite;
            white-space: nowrap;
        }
        @keyframes ticker {
            0% { transform: translateX(100%); }
            100% { transform: translateX(-100%); }
        }

        /* Hide Scrollbars */
        ::-webkit-scrollbar { display: none; }
        * { scrollbar-width: none; }
    </style>

    <script type="importmap">
    {
      "imports": {
        "react/": "https://esm.sh/react@^19.2.4/",
        "react": "https://esm.sh/react@^19.2.4",
        "react-dom/": "https://esm.sh/react-dom@^19.2.4/",
        "@supabase/supabase-js": "https://esm.sh/@supabase/supabase-js@2.39.7"
      }
    }
    </script>
<link rel="stylesheet" href="/index.css">
</head>
<body>
    <!-- Splash Screen -->
    <div id="splash-screen">
        <div class="logo-container">
            <svg viewBox="0 0 100 100" width="80" height="80">
                <path d="M50 8C50 8 32 38 32 68C32 78 40 85 50 85C60 85 68 78 68 68C68 38 50 8 50 8Z" fill="#6366f1" />
                <circle cx="50" cy="35" r="5" fill="white" />
                <path d="M50 48L42 58H47V75H53V58H58L50 48Z" fill="white" />
            </svg>
        </div>
        <h1 style="font-size: 14px; font-weight: 900; letter-spacing: 4px; color: white; text-transform: uppercase; margin-bottom: 20px;">Task Nova Pro</h1>
        <div class="loading-bar"></div>
    </div>

    <!-- React Root -->
    <div id="root"></div>

    <script>
        window.addEventListener('DOMContentLoaded', () => {
            setTimeout(() => {
                const splash = document.getElementById('splash-screen');
                if (splash) {
                    splash.style.opacity = '0';
                    setTimeout(() => {
                        splash.style.visibility = 'hidden';
                    }, 500);
                }
            }, 2000);
        });
    </script>
<script type="module" src="/index.tsx"></script>
</body>
</html>
